<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WB Objection Training</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #0F1419; overflow: hidden; }
      @keyframes pulse { 0%,100% { opacity: .3 } 50% { opacity: 1 } }
      @keyframes orbBreathe { 0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(67,160,71,.4), 0 0 40px rgba(67,160,71,.35) } 50% { transform: scale(1.06); box-shadow: 0 0 0 22px rgba(67,160,71,0), 0 0 60px rgba(67,160,71,.55) } }
      @keyframes orbSpin { from { transform: rotate(0) } to { transform: rotate(360deg) } }
      @keyframes orbSpeak { 0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212,168,67,.5), 0 0 40px rgba(212,168,67,.4) } 50% { transform: scale(1.04); box-shadow: 0 0 0 28px rgba(212,168,67,0), 0 0 70px rgba(212,168,67,.6) } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
